name: Soroban Guard Full
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: your-org/soroban-guard-action@v1
        id: guard
        with:
          path: contracts/
          format: sarif
          min_severity: medium
          exclude: "**/test/**,**/mock/**"
          upload_sarif: 'true'
          fail_on: critical

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.guard.outputs.report_path }}
